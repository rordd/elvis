<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PicoClaw Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
#header{background:#16213e;padding:12px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #0f3460}
#header h1{font-size:16px;font-weight:600;color:#e94560}
#status{font-size:11px;padding:2px 8px;border-radius:10px;background:#333;color:#888}
#status.connected{background:#1b4332;color:#52b788}
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:80%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-wrap:break-word;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:#0f3460;color:#e0e0e0;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:#16213e;color:#e0e0e0;border-bottom-left-radius:4px;border:1px solid #0f3460}
.msg .source{display:inline-block;font-size:10px;color:#888;margin-top:4px;padding:1px 6px;background:#0a0a1a;border-radius:4px}
#input-area{background:#16213e;padding:12px 16px;border-top:1px solid #0f3460;display:flex;gap:8px}
#input{flex:1;padding:10px 14px;border:1px solid #0f3460;border-radius:8px;background:#1a1a2e;color:#e0e0e0;font-size:14px;outline:none;resize:none;max-height:120px;font-family:inherit}
#input:focus{border-color:#e94560}
#send{padding:10px 20px;background:#e94560;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
#send:hover{background:#c73e54}
#send:disabled{background:#333;cursor:not-allowed}
.streaming-indicator{color:#888;font-size:12px;font-style:italic}
</style>
</head>
<body>
<div id="header">
  <h1>PicoClaw</h1>
  <span id="status">disconnected</span>
</div>
<div id="messages"></div>
<div id="input-area">
  <textarea id="input" rows="1" placeholder="Type a message..." autocomplete="off"></textarea>
  <button id="send">Send</button>
</div>
<script>
(function(){
  const messages = document.getElementById('messages');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const status = document.getElementById('status');
  let ws = null;
  let sessionId = null;
  let streamEl = null;
  let streamContent = '';

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws');

    ws.onopen = function() {
      status.textContent = 'connected';
      status.className = 'connected';
    };

    ws.onclose = function() {
      status.textContent = 'disconnected';
      status.className = '';
      setTimeout(connect, 2000);
    };

    ws.onerror = function() {
      ws.close();
    };

    ws.onmessage = function(e) {
      const msg = JSON.parse(e.data);

      if (msg.type === 'connected') {
        sessionId = msg.session_id;
        return;
      }

      if (msg.type === 'response') {
        finishStream();
        addMessage(msg.content, 'bot', msg.source);
        return;
      }

      if (msg.type === 'stream') {
        if (!streamEl) {
          streamEl = addMessage('', 'bot');
          streamContent = '';
        }
        streamContent += msg.content;
        streamEl.firstChild.textContent = streamContent;
        if (msg.done) {
          if (msg.source) {
            const src = document.createElement('div');
            src.className = 'source';
            src.textContent = msg.source;
            streamEl.appendChild(src);
          }
          streamEl = null;
          streamContent = '';
        }
        scrollDown();
        return;
      }
    };
  }

  function finishStream() {
    if (streamEl) {
      streamEl = null;
      streamContent = '';
    }
  }

  function addMessage(text, type, source) {
    const el = document.createElement('div');
    el.className = 'msg ' + type;
    const content = document.createElement('span');
    content.textContent = text;
    el.appendChild(content);
    if (source) {
      const src = document.createElement('div');
      src.className = 'source';
      src.textContent = source;
      el.appendChild(src);
    }
    messages.appendChild(el);
    scrollDown();
    return el;
  }

  function scrollDown() {
    messages.scrollTop = messages.scrollHeight;
  }

  function send() {
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    addMessage(text, 'user');
    ws.send(JSON.stringify({type: 'message', content: text, session_id: sessionId}));
    input.value = '';
    input.style.height = 'auto';
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // Auto-resize textarea
  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  connect();
})();
</script>
</body>
</html>
