name: Upstream Sync & Regression Test

on:
  schedule:
    # 매일 18:00 UTC (KST 03:00)
    - cron: '0 18 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  sync-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/sipeed/picoclaw.git || true
          git fetch upstream main

      - name: Attempt merge
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "before=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "upstream=$(git rev-parse upstream/main)" >> $GITHUB_OUTPUT
          if git merge upstream/main --no-edit; then
            echo "conflict=false" >> $GITHUB_OUTPUT
          else
            echo "conflict=true" >> $GITHUB_OUTPUT
            git merge --abort
          fi

      - name: Build
        if: steps.merge.outputs.conflict == 'false'
        run: make deps && make build

      - name: Run tests
        if: steps.merge.outputs.conflict == 'false'
        id: test
        run: |
          if make test 2>&1 | tee /tmp/test-output.txt; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Push if tests pass
        if: steps.merge.outputs.conflict == 'false' && steps.test.outputs.passed == 'true'
        run: git push origin main

      # --- Telegram 알림 (먼저) ---
      - name: Telegram - sync success
        if: always() && steps.merge.outputs.conflict == 'false' && steps.test.outputs.passed == 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot8578831991:AAGMfh4W8kXOGJjtAA0uRcEg2kO1Wc0-qvw/sendMessage" \
            -d chat_id="8394492274" \
            -d text="✅ Elvis upstream sync 완료 (upstream: ${UPSTREAM_SHA:0:7})"
        env:
          UPSTREAM_SHA: ${{ steps.merge.outputs.upstream }}

      - name: Telegram - merge conflict
        if: always() && steps.merge.outputs.conflict == 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot8578831991:AAGMfh4W8kXOGJjtAA0uRcEg2kO1Wc0-qvw/sendMessage" \
            -d chat_id="8394492274" \
            -d text="⚠️ Elvis upstream sync conflict (upstream: ${UPSTREAM_SHA:0:7}). 수동 해결 필요."
        env:
          UPSTREAM_SHA: ${{ steps.merge.outputs.upstream }}

      - name: Telegram - test regression
        if: always() && steps.merge.outputs.conflict == 'false' && steps.test.outputs.passed == 'false'
        run: |
          curl -s -X POST "https://api.telegram.org/bot8578831991:AAGMfh4W8kXOGJjtAA0uRcEg2kO1Wc0-qvw/sendMessage" \
            -d chat_id="8394492274" \
            -d text="🔴 Elvis upstream sync regression (upstream: ${UPSTREAM_SHA:0:7}). 머지 안 됨. 확인 필요."
        env:
          UPSTREAM_SHA: ${{ steps.merge.outputs.upstream }}

      # --- GitHub Issue (선택적) ---
      - name: Issue - conflict
        if: always() && steps.merge.outputs.conflict == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Upstream sync conflict',
              body: `Upstream merge failed.\n\nUpstream: \`${process.env.UPSTREAM_SHA}\``,
              labels: ['upstream-sync']
            })
        env:
          UPSTREAM_SHA: ${{ steps.merge.outputs.upstream }}

      - name: Issue - regression
        if: always() && steps.merge.outputs.conflict == 'false' && steps.test.outputs.passed == 'false'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔴 Upstream sync regression',
              body: `Tests failed after merge.\n\nUpstream: \`${process.env.UPSTREAM_SHA}\``,
              labels: ['upstream-sync', 'regression']
            })
        env:
          UPSTREAM_SHA: ${{ steps.merge.outputs.upstream }}
